<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Laktic" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" href="/icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Laktic — Train Smarter" />
    <meta property="og:description" content="AI-powered athlete coaching platform. Your coach sets up a bot once — it coaches every athlete autonomously." />
    <meta property="og:image" content="https://laktic.com/icon.png" />

    <title>Laktic — Train Smarter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      @keyframes lk-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading screen — replaced when React mounts -->
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0a;">
        <img src="/icon.png" alt="Laktic" style="width:72px;height:72px;border-radius:16px;animation:lk-pulse 1.6s ease-in-out infinite;" />
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
